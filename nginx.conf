server {
    listen 80;
    server_name vm107.htl-leonding.ac.at;

    access_log /var/log/nginx/imagor_access.log imagor_dbg;

    location ^~ /imagor/ {
        rewrite ^/imagor/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        add_header X-Imagor-Proxy "1" always;
        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Cookie        $http_cookie;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /imagor/;
        proxy_read_timeout 300;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vm107.htl-leonding.ac.at;

    # SSL Config
    ssl_certificate /etc/letsencrypt/live/vm107.htl-leonding.ac.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vm107.htl-leonding.ac.at/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/imagor_access.log imagor_dbg;

    # ---------------- IMAGOR ----------------
    location ^~ /imagor/ {
        rewrite ^/imagor/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        add_header X-Imagor-Proxy "1" always;
        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   Cookie        $http_cookie;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /imagor/;
        proxy_read_timeout 300;
    }

    # ======================================================
    # KEYCLOAK (unter /main/auth/)
    # ======================================================
    location = /main/auth { return 301 /main/auth/; }
    location ^~ /main/auth/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ======================================================
    # KEYCLOAK ALIAS (fix für NG04002): /auth/* -> Keycloak
    # ======================================================
    location = /auth { return 301 /auth/; }
    location ^~ /auth/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ======================================================                                                                                                                                   
    # KEYCLOAK ADMIN CONSOLE                                                                                                                                                                   
    # ======================================================                                                                                                                                   
                                                                                                                                                                                             
    # Admin console main entry                                                                                                                                                                 
    location ^~ /auth/admin/ {                                                                                                                                                                 
        proxy_pass http://127.0.0.1:8081/admin/;                                                                                                                                               
        proxy_set_header Host $host;                                                                                                                                                           
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                                               
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;                                                                                                                           
        proxy_set_header X-Forwarded-Proto $scheme;                                                                                                                                            
        proxy_set_header X-Forwarded-Host $host;                                                                                                                                               
        proxy_set_header X-Forwarded-Port 443;                                                                                                                                                 
        proxy_buffer_size 128k;                                                                                                                                                                
        proxy_buffers 4 256k;                                                                                                                                                                  
        proxy_busy_buffers_size 256k;                                                                                                                                                          
    }                                                                                                                                                                                          
                                                                                                                                                                                             
    # Keycloak JS resources                                                                                                                                                                    
    location ^~ /auth/js/ {                                                                                                                                                                    
        proxy_pass http://127.0.0.1:8081/js/;                                                                                                                                                  
        proxy_set_header Host $host;                                                                                                                                                           
        proxy_set_header X-Forwarded-Proto $scheme;                                                                                                                                            
    }                                                                                                                                                                                          
                                                                                                                                                                                             
    # Admin API                                                                                                                                                                                
    location ^~ /auth/admin/realms/ {                                                                                                                                                          
        proxy_pass http://127.0.0.1:8081/admin/realms/;                                                                                                                                        
        proxy_set_header Host $host;                                                                                                                                                           
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                                               
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;                                                                                                                           
        proxy_set_header X-Forwarded-Proto $scheme;                                                                                                                                            
    }
         
    location ^~ /resources/ {
        proxy_pass http://127.0.0.1:8081/resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
     }

     location ^~ /realms/ {
    	proxy_pass http://127.0.0.1:8081/realms/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
     }


    # ======================================================
    # ✅ MEALPLAN (muss VOR /api/ und VOR / stehen!)
    # ======================================================
   location ~ ^/mealplan/(?!api/)(.*)$ {
    # wenn jemand /mealplan/irgendwas ohne trailing slash aufruft
    # und das eine "SPA-Route" ist, leiten wir auf Hash-Routing um
   	 return 302 /mealplan/#/$1;
   }
    # /mealplan  -> /mealplan/
    location = /mealplan {
        return 301 /mealplan/;
   }

    # Mealplan Backend API: /mealplan/api/*  ->  http://127.0.0.1:8082/api/*
    location ^~ /mealplan/api/ {
        proxy_pass http://127.0.0.1:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # Mealplan Frontend: /mealplan/*  ->  http://127.0.0.1:4201/*
    # WICHTIG: wir strippen /mealplan/, damit das Container-nginx sauber Dateien findet

    location ^~ /mealplan/ {

        rewrite ^/mealplan/(.*)$ /$1 break;
	proxy_set_header Accept-Encoding "";
	sub_filter '<base href="/">' '<base href="/mealplan/">';
	sub_filter_once off;
        proxy_pass http://127.0.0.1:4201;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---------------- DEIN "HAUPT" BACKEND ----------------
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # ---------------- DEIN "HAUPT" FRONTEND ----------------
    location / {
        proxy_pass http://127.0.0.1:4200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional: Cache für statische Dateien vom Haupt-Frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        proxy_pass http://127.0.0.1:4200;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
