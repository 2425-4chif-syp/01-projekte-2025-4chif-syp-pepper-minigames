apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mealplan-postgres
  labels:
    app.kubernetes.io/name: mealplan-postgres
    app.kubernetes.io/part-of: pep-mealplan
spec:
  serviceName: mealplan-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mealplan-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mealplan-postgres
        app.kubernetes.io/part-of: pep-mealplan
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: mealplan
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mealplan-postgres-credentials
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mealplan-postgres-credentials
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: mealplan-postgres-data
