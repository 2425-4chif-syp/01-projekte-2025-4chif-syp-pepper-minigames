name: Build Mealplan Frontend LeoCloud Image

on:
  push:
    branches:
      - main
    paths:
      - 'pep-mealplan/frontend/**'
      - '.github/workflows/build-mealplan-frontend-leocloud.yaml'
  workflow_dispatch:

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and set image tag
        run: |
          if test "${{ github.ref_name }}" = "main"; then tag="latest"; else tag="dev"; fi
          echo "IMAGE_TAG=${tag}" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'pep-mealplan/frontend/package-lock.json'

      - name: Install frontend deps
        working-directory: pep-mealplan/frontend
        run: npm ci

      - name: Build frontend for LeoCloud
        working-directory: pep-mealplan/frontend
        run: npm run build:leocloud

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push LeoCloud image
        uses: docker/build-push-action@v5
        with:
          context: ./pep-mealplan/frontend
          file: ./pep-mealplan/frontend/Docker/Dockerfile
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/mealplan-frontend-leocloud:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
